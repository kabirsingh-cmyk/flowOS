<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FlowOS — AI that creates, posts, and measures across every channel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles/tokens.css" />
<style>
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--paper-2); }
  #root { height: 100vh; }

  /* Legacy workspace styles kept — workspaces still render inside the canvas pane */
  .scroll { flex: 1; overflow: auto; background: var(--paper-2); position: relative; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 18px; background: var(--paper); border-bottom: 1px solid var(--rule); min-height: 48px; }
  .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--muted); }
  .breadcrumb .cur { color: var(--ink); font-weight: 500; }
  .tb-right { display: flex; align-items: center; gap: 10px; font-size: 12px; }
  .tb-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border: 1px solid var(--rule);
    border-radius: 999px; font-size: 11.5px; color: var(--muted);
  }

  /* Typing pulse */
  @keyframes pulse { 0%, 100% { opacity: 0.3 } 50% { opacity: 1 } }
  .dot-pulse { animation: pulse 1.2s ease-in-out infinite; }
</style>
</head>
<body>
